<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medallion PR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
      --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
      --radius: 6px;
      --transition: 150ms ease;
    }

    [data-theme="dark"] {
      --bg-base: #0d1117;
      --bg-surface: #161b22;
      --bg-elevated: #1c2129;
      --bg-hover: #21262d;
      --border: #30363d;
      --border-subtle: #21262d;
      --text-primary: #f0f6fc;
      --text-secondary: #b1bac4;
      --text-muted: #7d8590;
      --accent-red: #ff6b6b;
      --accent-red-dim: rgba(255, 107, 107, 0.15);
      --accent-red-glow: rgba(255, 107, 107, 0.4);
      --accent-green: #3fb950;
      --accent-blue: #58a6ff;
      --shadow: rgba(0, 0, 0, 0.4);
    }

    [data-theme="light"] {
      --bg-base: #ffffff;
      --bg-surface: #f6f8fa;
      --bg-elevated: #ffffff;
      --bg-hover: #eaeef2;
      --border: #d0d7de;
      --border-subtle: #e8ecf0;
      --text-primary: #1f2328;
      --text-secondary: #59636e;
      --text-muted: #8b949e;
      --accent-red: #e5484d;
      --accent-red-dim: rgba(229, 72, 77, 0.12);
      --accent-red-glow: rgba(229, 72, 77, 0.3);
      --accent-green: #1a7f37;
      --accent-blue: #0969da;
      --shadow: rgba(31, 35, 40, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    body {
      width: 380px;
      min-height: 200px;
      max-height: 520px;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-logo {
      width: 20px;
      height: 20px;
      opacity: 0.9;
      color: var(--text-secondary);
    }

    .header-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .btn {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-weight: 500;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--text-muted);
    }

    .btn:active { transform: scale(0.97); }

    .btn-sync {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      padding: 5px 10px;
    }

    .btn-sync svg {
      width: 13px;
      height: 13px;
      transition: transform 0.3s ease;
    }

    .btn-sync.syncing svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-add {
      font-size: 12px;
      padding: 7px 14px;
    }

    .add-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .add-row-inputs {
      display: flex;
      gap: 6px;
    }

    .field {
      flex: 1;
      background: var(--bg-base);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 12px;
      padding: 7px 10px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color var(--transition);
    }

    .field:focus { border-color: var(--text-muted); }
    .field::placeholder { color: var(--text-muted); font-style: italic; }

    .field-title { font-family: var(--font-sans); }
    .field-query { font-family: var(--font-mono); }

    .items-container {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .items-container::-webkit-scrollbar { width: 6px; }
    .items-container::-webkit-scrollbar-track { background: transparent; }
    .items-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .items-container::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px 9px 12px;
      border-left: 3px solid var(--text-muted);
      transition: all var(--transition);
      position: relative;
    }

    .item:hover { background: var(--bg-surface); }
    .item.is-clean { border-left-color: var(--accent-green); }
    .item.has-unread { border-left-color: var(--accent-red); }

    .item.has-unread .item-border-glow {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent-red);
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 4px var(--accent-red-dim); }
      50% { box-shadow: 0 0 10px var(--accent-red-glow); }
    }

    .item-indicator {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-muted);
      transition: all 0.25s ease;
    }

    .item.is-clean .item-indicator { background: var(--accent-green); }
    .item.has-unread .item-indicator { background: var(--accent-red); }

    .item-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .item-title {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .item-query {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
    }

    .item-query.no-title {
      font-size: 12px;
      color: var(--text-primary);
    }

    .item-meta {
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .item-counts {
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-weight: 500;
    }

    .item-counts.has-unread { color: var(--accent-red); }

    .item-error {
      color: var(--accent-red);
      font-size: 10px;
      max-width: 200px;
    }

    .item-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      opacity: 0.4;
      transition: opacity var(--transition);
    }

    .item:hover .item-actions { opacity: 1; }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-icon:hover {
      background: var(--bg-hover);
      border-color: var(--border);
      color: var(--text-primary);
    }

    .btn-icon svg { width: 14px; height: 14px; }

    .btn-remove:hover {
      color: var(--accent-red);
      border-color: var(--accent-red-dim);
      background: var(--accent-red-dim);
    }

    .btn-theme {
      opacity: 0.6;
      width: 28px;
      height: 28px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 8px;
    }

    .empty-state-icon { color: var(--text-muted); opacity: 0.5; }
    .empty-state-icon svg { width: 32px; height: 32px; }
    .empty-state-text { font-size: 12px; color: var(--text-muted); text-align: center; }

    .toast {
      position: fixed;
      bottom: -50px;
      left: 16px;
      right: 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: bottom 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .toast.visible { bottom: 12px; }

    .toast-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .toast-dot.green { background: var(--accent-green); }
    .toast-dot.red { background: var(--accent-red); }

    .toast-text span {
      color: var(--text-primary);
      font-weight: 500;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body data-theme="dark">
  <div class="header">
    <div class="header-left">
      <svg class="header-logo" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      <span class="header-title">Medallion PR</span>
    </div>
    <div class="header-right">
      <button class="btn-icon btn-theme" id="btnTheme" title="Toggle theme">
        <svg id="iconMoon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 8.5a6 6 0 01-7.5-7.5 6.5 6.5 0 107.5 7.5z"/>
        </svg>
        <svg id="iconSun" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
          <circle cx="8" cy="8" r="3"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
        </svg>
      </button>
      <button class="btn btn-sync" id="btnSync">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1.5 8a6.5 6.5 0 0111.25-4.5M14.5 8a6.5 6.5 0 01-11.25 4.5"/>
          <path d="M13.5 1v3.5H10M2.5 15v-3.5H6"/>
        </svg>
        Sync
      </button>
    </div>
  </div>

  <div class="add-row">
    <input type="text" class="field field-title" id="addTitleInput" placeholder="Title (optional)" spellcheck="false">
    <div class="add-row-inputs">
      <input type="text" class="field field-query" id="addInput" placeholder="is:open author:username" spellcheck="false">
      <button class="btn btn-add" id="btnAdd">Add</button>
    </div>
  </div>

  <div class="items-container" id="itemsContainer"></div>

  <div class="toast" id="toast">
    <div class="toast-dot" id="toastDot"></div>
    <div class="toast-text" id="toastText"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
